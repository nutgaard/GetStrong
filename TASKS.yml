    acceptance_criteria:
      - Workouts are persisted across app restarts (verified by creating
        workouts, restarting app, and confirming they remain).
      - Workout summaries are persisted across app restarts and accessible from
        history or equivalent UI.
      - User can create at least 3 different workouts and run any of them from
        the workout list.
      - During an active workout, app presents guided exercise flow (warmups
        then work sets per exercise) as specified.
      - User can mark any warmup or work set complete at any time with one tap
        from execution UI.
      - Rest timer defaults to 3 minutes, is configurable, and plays a sound
        when done.
      - Warmup sets are auto-generated deterministically from working weight and
        match heuristic rules (verified via tests and manual spot-checks).
      - Progression mode is configurable per exercise (or defaults correctly),
        and defaults are applied for new exercises.
      - Deload is triggered after 3 consecutive failed workouts per exercise
        using configured percent (default 10%), verified with controlled test
        data.
      - Workout summary displays reps per set, total volume, and elapsed time at
        completion.
      - Screen remains awake during active workout sessions as described in the
        PRD.
      - A short test report is produced summarizing the results and any known
        deviations (should be zero or explicitly justified).
    constraints:
      - Focus on MVP scope only; do not expand scope for this task.
      - Where automation is not feasible, provide clear manual test steps.
