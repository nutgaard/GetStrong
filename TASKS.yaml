version: 1
owner: team-lead

ux_contract:
  source_of_truth: UX.md
  semantics:
    - "`status` tracks implementation progress only."
    - "`ux_status` tracks UX acceptance against UX.md for user-visible tasks that carry `ux_references`."
    - "`status: done` does not mean a task is accepted to spec unless `ux_status: verified`."
  ux_status_values:
    planned: UX expectations are defined, but the task is not yet ready for UX acceptance.
    pending_review: Implementation is ready for UX review against the declared `ux_references`.
    needs_rework: Implementation exists, but it is not accepted against UX.md and must not be treated as UX-complete.
    verified: QA or the user has accepted the task against its declared `ux_references`.
  rules:
    - Any task that changes user-visible UI and is covered by the current UX contract must include `ux_references` pointing to the relevant screens or sections in UX.md.
    - If a user-visible task has no meaningful UX reference yet, update UX.md or the documentation-maintenance task first so the feature task can point to a concrete contract.
    - Broader section references such as `UX.md#Overall Structure` or `UX.md#Repeated Interaction Patterns` are acceptable when a dedicated screen mock does not yet exist, but the task should tighten those references once a concrete screen contract is documented.
    - UI tasks must carry explicit UX-focused acceptance criteria alongside functional requirements.
    - QA uses the listed `ux_references` to move `ux_status` to `verified`; implementation `status` is tracked separately.
    - Legacy user-visible tasks completed before the UX contract should default to `ux_status: needs_rework` unless they have been explicitly re-accepted against UX.md.
    - Documentation tasks keep UX.md, product-description.md, and ADRs aligned; they do not act as a late UI/UX fix-up bucket.

milestones:
  - id: M1
    name: Android App Shell & Architecture
    description: Set up the Android project, core architecture, and persistence foundation.
    priority: P0
    tasks:
      - id: T1
        title: Scaffold Android project and navigation
        description: Create the base Android app (package, build config, navigation structure, and theme) suitable for the Home, Programs, and Active Workout flows.
        priority: P0
        status: done
        ux_status: needs_rework
        ux_references:
          - "UX.md#Overall Structure"
          - "UX.md#Top-Level Navigation"
          - "UX.md -> start_screen.png"
        acceptance_criteria:
          - Project builds and runs on an Android emulator/device with no runtime errors.
          - App shows a home screen entry point for workouts with the primary quick-start action.
          - Navigation framework is in place to support at least the Home, Programs, and Active Workout flows.
          - The top-level shell structure matches the UX contract for persistent bottom navigation versus focused child flows.
          - QA can verify the shell and Home entry point against the listed ux_references.
      - id: T2
        title: Choose and wire persistence mechanism
        description: Select and integrate a local persistence solution (e.g., Room/SQL, DataStore) for workouts, exercises, and workout summaries.
        priority: P0
        status: done
        acceptance_criteria:
          - Persistence layer is implemented behind clear interfaces usable by feature modules.
          - Data for workouts, exercises, and summaries can be saved and retrieved in a simple demo flow.
          - Solution requires no network or cloud services.

      - id: T21
        title: Harden persistence with transactions and tests
        description: Ensure multi-step persistence operations use transactions and add targeted automated tests for core Room/DataStore flows.
        priority: P1
        status: done
        acceptance_criteria:
          - Multi-entity writes such as saveWorkout run inside a Room transaction so partial failures do not leave inconsistent state.
          - At least one automated test verifies that saveWorkout either fully applies or fully rolls back changes on error.
          - At least one automated test verifies basic read/write behavior for a key entity (e.g., workout or exercise) through the repository layer, not direct DAOs.

  - id: M2
    name: Exercise Catalog
    description: Ship a built-in offline catalog of common exercises with metadata.
    priority: P0
    tasks:
      - id: T3
        title: Define exercise data model and storage
        description: Design the model for exercises including primary/secondary muscle groups and equipment type, and store it locally.
        priority: P0
        status: done
        acceptance_criteria:
          - Exercise entity includes name, primary_muscle_group, secondary_muscle_groups (optional), and equipment_type.
          - Data model is persisted via the chosen persistence layer.
          - Model supports referencing exercises from workouts by stable ID.
      - id: T4
        title: Seed 50 common exercises locally
        description: Populate and expose a built-in catalog of at least 50 common resistance training exercises.
        priority: P0
        status: done
        acceptance_criteria:
          - At least 50 exercises are present at first app launch with no network access.
          - Each exercise in the catalog has populated primary muscle group and equipment type.
          - Catalog can be listed in a simple UI screen for selection.

  - id: M3
    name: Workout Planning
    description: Allow users to create, edit, delete, and persist multiple named workouts.
    priority: P0
    tasks:
      - id: T5
        title: Design workout and exercise-in-workout models
        description: Define data structures for a workout and its ordered list of exercises, including per-exercise configuration hooks (sets, reps, progression mode, etc.).
        priority: P0
        status: done
        acceptance_criteria:
          - Workout model includes a name and ordered collection of exercise slots.
          - Each exercise in a workout references an exercise from the catalog and supports per-exercise configuration fields.
          - Model is persisted and can be loaded reliably between app restarts.
      - id: T6
        title: Implement workout CRUD UI
        description: Provide screens to create, edit, and delete multiple named workouts (e.g., Push/Pull/Legs) and manage their exercises.
        priority: P0
        status: done
        ux_status: verified
        ux_references:
          - "UX.md -> workout_overview.png"
          - "UX.md -> edit_workout.png"
          - "UX.md#Navigation Relationships"
        acceptance_criteria:
          - User can create at least three named workouts.
          - User can add, reorder, and remove exercises within a workout.
          - Workouts remain available with correct structure after app restart.
          - Workout planning lists show only the exercises selected for that workout, not the entire exercise catalog inline.
          - The Add exercise action opens a search/scroll picker of exercises not already selected.
          - Duplicate exercises within the same workout are prevented.
          - Exercise lists use standard Android list patterns (e.g., item rows with overflow/context menus) instead of cramped inline Add/Edit/Delete buttons.
          - The Programs flow matches the documented workout overview and workout editor behavior in the referenced UX screens, including the bounded local slot-editing flow used in the current branch.
          - QA can verify the Programs and editor flows against the listed ux_references.
      - id: T32
        title: Resolve Programs tabs beyond Workouts before shipping them
        description: Define the purpose and scope of the `Program`, `Weights`, and `Sets×Reps` tabs before they ship as part of the Programs area.
        priority: P2
        status: todo
        ux_status: planned
        ux_references:
          - "UX.md -> workout_overview.png"
          - "UX.md#Assumptions And Ambiguities"
        acceptance_criteria:
          - Each non-`Workouts` Programs tab is either documented with clear scope and owned behavior or explicitly deferred/hidden from the shipped UI.
          - product-description.md and UX.md are updated before implementation if any of these tabs become active work.
          - QA can verify that no undocumented placeholder tabs ship in the Programs area.
      - id: T33
        title: Resolve the Exercise Detail Form tab before shipping it
        description: Define the purpose and scope of the `Form` tab in exercise detail before it ships as part of the tabbed editor flow.
        priority: P2
        status: todo
        ux_status: planned
        ux_references:
          - "UX.md -> edit_exercise.png"
          - "UX.md#Assumptions And Ambiguities"
        acceptance_criteria:
          - The `Form` tab is either documented with explicit in-scope content and behavior or explicitly deferred/hidden from the shipped UI.
          - UX.md and product-description.md are updated before implementation if the `Form` tab becomes active work.
          - QA can verify that no undocumented placeholder `Form` tab ships in exercise detail.

  - id: M4
    name: Workout Execution Flow
    description: Guide users through running a saved workout, including warmups and work sets per exercise.
    priority: P0
    tasks:
      - id: T7
        title: Implement workout session engine and flow
        description: Build the execution logic that runs a saved workout in the specified order, including warmups then work sets for each exercise.
        priority: P0
        status: done
        ux_status: needs_rework
        ux_references:
          - "UX.md#Navigation Relationships"
          - "UX.md -> start_screen.png"
          - "UX.md -> workout_in_progress_0.png"
          - "UX.md -> workout_warmup.png"
        acceptance_criteria:
          - User can start any saved workout from the Programs flow.
          - Session iterates through exercises in the workout, presenting warmup sets first and work sets afterward for each exercise.
          - Session completes when all planned sets in the workout are handled.
          - QA can verify the workout-start and in-session flow against the listed ux_references before this task is treated as UX-complete.
      - id: T8
        title: Set completion interaction and UI
        description: Design and implement set completion UI that supports partial reps and contextual actions, following the active workout mockup.
        priority: P0
        status: done
        ux_status: verified
        ux_references:
          - "UX.md -> workout_in_progress_0.png"
          - "UX.md -> workout_in_progress_1.png"
          - "UX.md -> workout_in_progress_2.png"
          - "UX.md -> workout_warmup.png"
          - "UX.md#Repeated Interaction Patterns"
        acceptance_criteria:
          - Current set is prominently displayed and completion does not hide or remove its information.
          - Tapping the gray set circle on an incomplete set marks it complete and sets achieved reps to the target.
          - Tapping the set circle again decrements the achieved reps by one, supporting partial reps (e.g., 4 of 5) down to 0.
          - Long-pressing a set opens a contextual menu for actions such as setting weight, setting reps, and clearing the set.
          - Behavior applies to both warmup and work sets and aligns with the interaction patterns shown in docs/images/workout_in_progress_0.png.
          - The active workout flow exposes the documented Workout/Warmup session structure without showing the top-level bottom navigation.
          - Users can add extra sets inline with the trailing plus affordance shown in the UX references.
          - Rest countdown feedback appears as a transient bottom overlay rather than a blocking full-screen interruption.
          - QA can verify the active workout interactions against the listed ux_references.
      - id: T9
        title: Keep screen awake during active workout
        description: Ensure the device screen does not sleep during an active workout session.
        priority: P1
        status: done
        acceptance_criteria:
          - While a workout session is active, the OS does not dim or lock the screen.
          - Normal screen behavior resumes once the workout is ended or paused.

  - id: M5
    name: Progression & Deload Logic
    description: Implement per-exercise progression modes, failure detection, and deload rules.
    priority: P0
    tasks:
      - id: T10
        title: Model per-exercise progression settings
        description: Add configuration for each exercise’s progression mode, rep range, weight increment, and deload percent with sensible defaults.
        priority: P0
        status: done
        acceptance_criteria:
          - Each exercise in a workout has a progression_mode field supporting weight_only, reps_only, and reps_then_weight.
          - Default progression mode is weight_only with a 2.5 kg increment.
          - Default working-set prescriptions are 5×5 for most exercises and 1×5 for deadlift.
      - id: T11
        title: Implement progression update rules
        description: Compute the next working weight and/or rep targets per exercise according to the configured progression mode after each workout.
        priority: P0
        status: done
        acceptance_criteria:
          - For weight_only, weight increases when all work sets meet target reps; otherwise weight stays the same.
          - For reps_only, reps increase within the configured range until max is reached before adjusting weight.
          - For reps_then_weight, reps increase up to rep-range max, then weight increases and reps reset to the rep-range min.
      - id: T12
        title: Track failures and apply deload
        description: Detect failed workouts and apply configurable deload percent after three consecutive failures per exercise.
        priority: P0
        status: done
        acceptance_criteria:
          - A workout for an exercise is flagged as failed if any work set is below target reps.
          - Consecutive failures are tracked separately per exercise across sessions.
          - After three consecutive failures, working weight is reduced by the configured deload percent (default 10%) and failure streak resets.

  - id: M6
    name: Warmup Generation
    description: Generate deterministic warmup sets from working weight using the specified heuristics and rounding rules.
    priority: P0
    tasks:
      - id: T13
        title: Implement warmup heuristics and rounding
        description: Given a planned working weight and equipment type, generate warmup sets that match the documented percentage-based heuristics and rounding.
        priority: P0
        status: done
        acceptance_criteria:
          - Warmup sets are calculated using the correct bands: <20 kg, 20–79.9 kg, 80–119.9 kg, and ≥120 kg.
          - Barbell loads are rounded to the nearest 2.5 kg total; dumbbell/machine loads to the nearest available increment (default 1.0 kg).
          - Example cases such as 9 kg lateral raises and 140 kg deadlifts produce warmups per the PRD examples.
      - id: T14
        title: Integrate warmups into workout session UI
        description: Surface generated warmup sets seamlessly in the workout execution flow before work sets for each exercise.
        priority: P0
        status: done
        ux_status: verified
        ux_references:
          - "UX.md -> workout_warmup.png"
          - "UX.md -> workout_in_progress_0.png"
          - "UX.md#Navigation Relationships"
        acceptance_criteria:
          - Warmup sets appear in order before work sets for each exercise.
          - Users can complete warmup sets with one tap, same as work sets.
          - Warmup generation is deterministic for the same exercise configuration.
          - Warmups are surfaced in the same session flow as the active workout screens, consistent with the UX references.

  - id: M7
    name: Timers
    description: Provide workout elapsed timer and rest timer behavior with notifications.
    priority: P0
    tasks:
      - id: T15
        title: Implement workout elapsed timer
        description: Track and display time from workout start to completion.
        priority: P1
        status: done
        acceptance_criteria:
          - Elapsed workout time starts when the user begins a session.
          - Elapsed time pauses or stops appropriately if a workout is ended or cancelled.
          - Final elapsed time is available for the workout summary.
      - id: T16
        title: Implement rest timer with sound notifications
        description: Add a configurable rest timer between work sets with a default of 3 minutes and a sound when rest ends.
        priority: P0
        status: done
        acceptance_criteria:
          - Rest timer starts after the last warmup set and before the first work set for an exercise.
          - No rest timer is started between warmup sets.
          - Default rest duration is 3 minutes, configurable per user or workout.
          - When the timer ends, a sound notification plays even if the screen is on.

  - id: M8
    name: Workout Summary & History
    description: Show and persist workout summaries for later analytics.
    priority: P0
    tasks:
      - id: T17
        title: Implement workout summary screen
        description: Display per-set results, total volume, and total time when a workout completes.
        priority: P0
        status: done
        ux_status: verified
        ux_references:
          - "UX.md#Overall Structure"
          - "UX.md#Navigation Relationships"
        acceptance_criteria:
          - At workout completion, user sees reps achieved per set, total lifted volume, and total workout time.
          - Summary clearly distinguishes warmup vs work sets.
          - User can dismiss the summary and return to the main app without losing data.
          - QA can verify the post-workout summary flow against the listed ux_references until a dedicated summary mock is added.
      - id: T18
        title: Persist workout summaries for history
        description: Store workout summaries locally for future analytics and charting.
        priority: P0
        status: done
        acceptance_criteria:
          - Workout summaries are saved via the persistence layer at session completion.
          - Summaries remain available across app restarts.
          - A simple history list view can display past workouts and basic details from their summaries.
      - id: T30
        title: Implement history list, calendar, and exercise history views
        description: Use persisted workout summaries to drive the History area, including list and calendar navigation plus per-exercise history drill-downs.
        priority: P1
        status: todo
        ux_status: planned
        ux_references:
          - "UX.md -> history_workout.png"
          - "UX.md -> history_calendar.png"
          - "UX.md -> history_exercise.png"
          - "UX.md#Navigation Relationships"
        acceptance_criteria:
          - History supports both list and calendar views of completed workouts.
          - History drill-downs show enough detail to match the documented workout-card and per-exercise history flows.
          - Per-exercise history lists non-warmup sets with date, reps, weight, and estimated 1RM or equivalent derived value.
          - QA can verify the History flows against the listed ux_references.
      - id: T34
        title: Resolve the History Notes tab before shipping it
        description: Define the purpose and scope of the `Notes` tab in the History area before it ships alongside the documented list and calendar views.
        priority: P2
        status: todo
        ux_status: planned
        ux_references:
          - "UX.md -> history_workout.png"
          - "UX.md#Assumptions And Ambiguities"
        acceptance_criteria:
          - The `Notes` tab is either documented with explicit in-scope behavior or explicitly deferred/hidden from the shipped UI.
          - UX.md and product-description.md are updated before implementation if the `Notes` tab becomes active work.
          - QA can verify that no undocumented placeholder `Notes` tab ships in the History area.
      - id: T31
        title: Implement progress overview and exercise chart drill-downs
        description: Use persisted workout history to power the top-level Progress screen and per-exercise progress charts described in UX.md.
        priority: P1
        status: todo
        ux_status: planned
        ux_references:
          - "UX.md -> progress.png"
          - "UX.md -> progress_exercise.png"
          - "UX.md#Navigation Relationships"
        acceptance_criteria:
          - The top-level Progress screen lists tracked exercises with current weight and a compact trend indicator.
          - Selecting an exercise opens a dedicated progress chart view with at least one recent time-range selector.
          - Progress drill-down is reachable from both the top-level Progress area and exercise detail where appropriate.
          - QA can verify the Progress flows against the listed ux_references.

  - id: M9
    name: Cross-Cutting UX Guardrails
    description: Capture UX constraints that all UI work must satisfy during implementation rather than leaving them to a late polish pass.
    priority: P1
    tasks:
      - id: T19
        title: Optimize layout for one-handed use
        description: Keep one-handed operation as a standing constraint for every workout-facing screen and interaction.
        priority: P1
        status: done
        ux_status: needs_rework
        ux_references:
          - "UX.md#Repeated Interaction Patterns"
          - "UX.md -> workout_in_progress_0.png"
          - "UX.md -> workout_in_progress_1.png"
        acceptance_criteria:
          - Primary set completion control is reachable with one thumb on common phone sizes.
          - Navigation between sets and exercises requires minimal taps and no fine precision.
          - No critical workout controls are hidden behind deep menus during an active session.
          - QA can use the listed ux_references when evaluating one-handed flow on affected screens.
      - id: T20
        title: Simplify active workout UI and reduce clutter
        description: Treat visual focus and low-clutter workout execution as a baseline guardrail for active-workout work, not as end-stage cleanup.
        priority: P1
        status: done
        ux_status: needs_rework
        ux_references:
          - "UX.md -> workout_in_progress_0.png"
          - "UX.md -> workout_in_progress_1.png"
          - "UX.md -> workout_in_progress_2.png"
        acceptance_criteria:
          - Current exercise and set information is visually dominant on the active workout screen.
          - Non-essential information (history, charts, settings) is not shown during active workouts.
          - Users in tests can identify and complete the current set without confusion.
          - QA can evaluate active-workout focus and clutter against the listed ux_references.

      - id: T28
        title: Standardize navigation and remove dev UI
        description: Make the documented navigation shell and production-only entry points part of the core implementation baseline.
        priority: P1
        status: todo
        ux_status: planned
        ux_references:
          - "UX.md#Overall Structure"
          - "UX.md#Top-Level Navigation"
          - "UX.md -> start_screen.png"
          - "UX.md -> workout_overview.png"
          - "UX.md -> history_workout.png"
          - "UX.md -> progress.png"
        acceptance_criteria:
          - The app uses top app bars with standard back/up behavior where appropriate.
          - A bottom navigation bar with icons exposes the core areas `Home`, `Programs`, `History`, `Progress`, and `Settings`.
          - Focused edit/detail flows and active workouts intentionally drop the bottom-navigation chrome and use back/up navigation instead.
          - Persistence demo and catalog debug actions are not visible in production UX on the frontpage or primary flows.
          - Lists and collections use standard Android list patterns (e.g., row actions, overflow menus, or swipe actions) instead of oversized inline Edit/Delete buttons.
          - QA can verify the production navigation shell against the listed ux_references.

  - id: M10
    name: Settings & Accessibility Polish
    description: Expose key training settings and improve accessibility/usability across core flows.
    priority: P2
    tasks:
      - id: T22
        title: Expose training settings UI
        description: Add UI to configure rest duration and preferred defaults (increment, progression mode, deload percent) used when creating new workout exercise slots.
        priority: P1
        status: done
        ux_status: needs_rework
        ux_references:
          - "UX.md#Overall Structure"
          - "UX.md#Top-Level Navigation"
        acceptance_criteria:
          - User can change default rest duration and see it reflected in new sessions.
          - User can adjust default weight increment and deload percent, and newly created workout exercise slots use the updated values as their initial configuration (existing slots are unchanged unless edited).
          - User can choose a default progression mode used to prefill new exercises/workouts; actual progression behavior always reads the stored configuration on each exercise slot, not a global setting.
          - QA can verify the Settings entry point and settings-scope expectations against the listed ux_references.
      - id: T23
        title: Accessibility and TalkBack pass
        description: Improve accessibility labels, focus order, and contrast on Home, Programs, Active Workout, and Summary screens.
        priority: P2
        status: done
        ux_status: needs_rework
        ux_references:
          - "UX.md#Overall Structure"
          - "UX.md#Repeated Interaction Patterns"
        acceptance_criteria:
          - Core controls on the four key screens have meaningful content descriptions for TalkBack.
          - Focus order allows completing a workout via keyboard/TalkBack without getting stuck.
          - Color and typography choices meet basic contrast/readability expectations.
          - QA can evaluate accessibility on the referenced screens and interaction patterns against the listed ux_references.
      - id: T24
        title: Error and empty state UX
        description: Add clear empty and error states for workouts, exercise catalog, and history lists.
        priority: P2
        status: done
        ux_status: needs_rework
        ux_references:
          - "UX.md -> start_screen.png"
          - "UX.md -> workout_overview.png"
          - "UX.md -> history_workout.png"
        acceptance_criteria:
          - When there are no workouts, exercises, or history entries, users see contextual empty-state messaging with a clear next action.
          - Common data/load errors show user-friendly messages instead of silent failures or crashes.
          - QA can intentionally simulate a repository error and observe a non-crashing, understandable error state in the UI.
          - QA can verify that empty/error states preserve the structure of the referenced UX flows instead of replacing them with ad-hoc layouts.

  - id: M11
    name: UX Contract & Documentation Maintenance
    description: Keep the UX contract and supporting product/architecture documentation aligned as screen decisions evolve.
    priority: P1
    tasks:
      - id: T29
        title: Keep UX and architecture documentation in sync
        description: Update UX.md, product-description.md, and relevant ADRs whenever a screen contract or navigation expectation changes.
        priority: P1
        status: todo
        acceptance_criteria:
          - UX.md remains the canonical UX summary for the current screenshot pack and implemented screen contracts.
          - product-description.md and any relevant ADRs are updated when UX decisions materially change navigation, screen ownership, or interaction patterns.
          - Documentation uses the current screenshot filenames consistently, and QA can verify that no active documentation still references removed or renamed UI image assets.
          - This task is treated as documentation maintenance only; feature tasks remain responsible for shipping their own UX behavior through `ux_references` and UX acceptance criteria.
          - Any task that materially changes user-visible UX must update the relevant documentation in the same change or explicitly pair with this task before the work is considered complete.
