name: AI Harness

on:
  pull_request:
  push:
    branches: [master]

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install harness deps
        working-directory: ai-harness
        run: bun install --frozen-lockfile

      - name: Typecheck harness
        run: bun run ai:typecheck

      - name: Run harness tests
        run: bun run ai:test

  android-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android checks
        run: |
          ./gradlew :app:testDebugUnitTest
          ./gradlew :app:lintDebug
          ./gradlew :app:assembleDebug
